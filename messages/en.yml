about:
  eyebrow: "// who we are"
  title: "Small team. Senior hands. Real ownership."
  paragraph1: "Codinc is a tight engineering studio. We take on a focused number of projects so each one gets people who actually care about the outcome."
  paragraph2: "We work the way good software gets made: short feedback loops, working software early, and a bias for shipping over talking. When we hand something over, it's documented, tested, and yours."
  stats:
    - value: "40+"
      label: "products shipped"
    - value: "8 yrs"
      label: "avg. engineer experience"
    - value: "100%"
      label: "code ownership to you"
    - value: "<24h"
      label: "response time"

team:
  eyebrow: "// our team"
  title: "Who you'll actually work with."
  sub: "A small, senior team of engineers and designers. Tap anyone to see what they bring."
  viewProfile: "View {name}'s profile"
  yearsExperience: "{years}+ yrs experience"
  hireMe: "Hire me →"
  members:
    - slug: "anas-farooqi"
      name: "Anas Farooqi"
      role: "Founder & CEO"
      avatar: "/team/anas-farooqi.svg"
      yearsExperience: 8
      bio: "Anas founded Codinc to build software the way it should be built — small senior teams, real ownership, and a bias for shipping. He sets the technical direction and stays close to every engagement, making sure each project gets the attention it deserves. Clients keep coming back for the straight answers as much as the code."
      skills: ["Product Strategy", "Architecture", "TypeScript", "Cloud", "Team Leadership", "React", "NestJS", "Next.js", "Redux", "Supabase", "TypeORM", "Prisma", "TanStack Query", "Sequelize", "AWS", "GCP", "Docker", "Rails", "RAG", "LLMs"]
    - slug: "bilal-farooqi"
      name: "Bilal Farooqi"
      role: "Co‑founder & COO"
      avatar: "/team/bilal-farooqi.svg"
      yearsExperience: 5
      bio: "Bilal runs the operation behind the work — delivery, process, and the day‑to‑day that keeps projects on track. He turns ambitious roadmaps into predictable shipping schedules and is the person clients talk to when they need things to just happen."
      skills: ["Operations", "Delivery", "Client Success", "Process", "React", "Next.js", "NestJS", "Supabase", "AWS", "Docker", "RAG", "LLMs", "n8n Workflows"]

