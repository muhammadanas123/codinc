# Case studies below describe real projects Codinc contributed to.
# The challenge/solution/result copy and every `metrics` value are ILLUSTRATIVE
# placeholders — replace them with figures you're comfortable publishing before launch.
caseStudies:
  eyebrow: "// selected work"
  title: "Real results, built end to end."
  sub: "A sample of products we've helped design, build, and ship — explore them live."
  visitSite: "Visit site"
  visitAriaLabel: "{title} — visit site (opens in a new tab)"
  allLabel: "All"
  challengeLabel: "Challenge"
  solutionLabel: "Solution"
  resultLabel: "Result"
  categories: ["E‑commerce", "Marketplace", "PropTech"]
  items:
    - slug: "purplecarrot.com"
      category: "E‑commerce"
      label: "Food · E‑commerce"
      title: "Purple Carrot"
      description: "A plant‑based meal‑kit service — recipes, subscriptions, and a checkout flow tuned to keep weekly orders effortless."
      url: "https://www.purplecarrot.com"
      visual: "v1"
      challenge: "Weekly meal‑kit orders lived or died on the subscription and checkout flow — every extra step meant lost recurring revenue."
      solution: "We rebuilt the subscription and checkout experience around fewer taps, clearer plans, and a faster path from recipe to reorder."
      result: "A smoother weekly reorder loop and a checkout that gets out of the customer's way."
      metrics: ["↓ 45% checkout drop‑off", "↑ 32% repeat orders"] # TODO: confirm — illustrative
      tech: ["Next.js", "Node.js", "Stripe", "Claude API", "CI/CD"]
    - slug: "cocoli.com"
      category: "Marketplace"
      label: "Retail · Marketplace"
      title: "Cocoli"
      description: "A curated marketplace for premium furniture and design, connecting independent sellers with buyers across Europe."
      url: "https://www.cocoli.com/en/de/"
      visual: "v2"
      challenge: "A two‑sided marketplace had to stay fast and trustworthy across thousands of listings and dozens of independent sellers."
      solution: "We built a performant catalog, seller tooling, and a checkout that handles multi‑seller carts without friction."
      result: "A marketplace that scales its catalog while keeping browsing quick and buying simple."
      metrics: ["10k+ live listings", "↑ 27% conversion"] # TODO: confirm — illustrative
      tech: ["React", "Node.js", "PostgreSQL", "Algolia", "Claude API"]
    - slug: "colochousing.com"
      category: "PropTech"
      label: "PropTech · Platform"
      title: "Coloc Housing"
      description: "A modern co‑living and housing platform — on web and native iOS and Android apps — that streamlines listings, applications, and tenant management end to end."
      url: "https://www.colochousing.com/"
      visual: "v3"
      challenge: "Listings, applications, and tenant management were spread across disconnected tools and manual steps."
      solution: "We unified the whole journey — from listing to signed tenant — into one platform with automated application handling."
      result: "A single system that takes a resident from first search to move‑in without the spreadsheet chaos."
      metrics: ["8 hrs/week saved", "1 platform, end to end"] # TODO: confirm — illustrative
      tech: ["Next.js", "NestJS", "PostgreSQL", "React Native", "Expo"]
    - slug: "crystalcommerce.com"
      category: "E‑commerce"
      label: "E‑commerce · Platform"
      title: "Crystal Commerce"
      description: "Commerce infrastructure for specialty and hobby retailers, syncing inventory and orders across thousands of storefronts."
      url: "https://www.crystalcommerce.com/"
      visual: "v4"
      challenge: "Thousands of storefronts needed inventory and orders kept in sync in near real time, without falling over at peak."
      solution: "We hardened the sync pipelines and monitoring so catalog and order data stay consistent across every channel."
      result: "Inventory that stays accurate across channels, even under heavy catalog and order volume."
      metrics: ["1000s of storefronts", "near real‑time sync"] # TODO: confirm — illustrative
      tech: ["Node.js", "AWS", "Docker", "Redis", "Jenkins", "Claude API"]

