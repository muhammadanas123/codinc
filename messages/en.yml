    - num: "02"
      title: "Cloud & DevOps"
      description: "We set up the infrastructure, pipelines, and monitoring so your software ships often and stays up."
      tags: ["AWS", "Docker", "CI/CD"]
    - num: "03"
      title: "AI integration"
      description: "Practical AI woven into real products — search, assistants, and automation that earn their place."
      tags: ["LLMs", "RAG", "Automation"]

