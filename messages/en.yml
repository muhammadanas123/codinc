faq:
  eyebrow: "// faq"
  title: "Questions, answered."
  sub: "Everything worth knowing before we work together. Still curious?"
  askLabel: "Just ask us directly →"
  items:
    - question: "What kind of projects do you take on?"
      answer: "Web and mobile apps, internal tools, platforms, and AI features — from a first MVP to a mature product that needs a serious team. If it's software that needs to be built right and shipped, we're a fit."
    - question: "How do you run a project?"
      answer: "Short weekly sprints, each ending in a demo. You get async updates and always know exactly where things stand — no radio silence, no surprises."
    - question: "What technologies do you work with?"
      answer: "TypeScript, React, Next.js, React Native, Node.js, and PostgreSQL, deployed on AWS, GCP, or Vercel. For AI and automation we work with LLMs, RAG, n8n, and OpenClaw."
    - question: "How long does a typical project take?"
      answer: "Most engagements run 4–12 weeks depending on scope. We'll give you an honest timeline after discovery — and flag it early if anything ever threatens the date."
    - question: "Who owns the code?"
      answer: "You do — 100%. Everything is handed over documented and tested, in your repositories and your accounts. No lock‑in, ever."
    - question: "Do you offer support after launch?"
      answer: "Yes. We offer retainer‑based monitoring, iteration, and support. Most clients stay with us well past the initial build."

