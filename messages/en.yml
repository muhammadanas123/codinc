  title: "A full team, from first sketch to production."
  sub: "No hand‑offs between strangers. The people who design your product are the ones who build and maintain it."
  items:
    - num: "01"
      title: "Web & mobile apps"
      description: "Custom applications built to last — from internal tools to customer‑facing products, on the web and on phones."
